# Pipeline integration test: socket source → remap transform → HTTP sink
#
# Tests that events flow through a real socket source, get transformed by remap,
# and are correctly encoded and delivered to an HTTP sink.

sources:
  socket:
    type: socket
    mode: tcp
    address: "127.0.0.1:19100"
    decoding:
      codec: json

transforms:
  parse:
    inputs: ["socket"]
    type: remap
    source: |
      .parsed = true
      .severity = upcase!(.level)
      del(.level)

sinks:
  http_out:
    inputs: ["parse"]
    type: http
    encoding:
      codec: json
    uri: "http://127.0.0.1:19101/"
    batch:
      timeout_secs: 1

tests:
  - name: "transforms and sends two events"
    generators:
      gen:
        type: socket
        address: "127.0.0.1:19100"
        events:
          - source: '{ "message": "hello world", "level": "info" }'
          - source: '{ "message": "something failed", "level": "error" }'

    listeners:
      out:
        type: http
        address: "127.0.0.1:19101"
        decoding:
          codec: json

    outputs:
      - extract_from: out
        conditions:
          - type: vrl
            source: |
              assert!(is_array(.))
              assert_eq!(length(.), 2)
              assert_eq!(.[0].message, "hello world")
              assert_eq!(.[0].severity, "INFO")
              assert_eq!(.[0].parsed, true)
              assert!(!exists(.[0].level))
              assert_eq!(.[1].message, "something failed")
              assert_eq!(.[1].severity, "ERROR")
